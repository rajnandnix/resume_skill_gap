services:
  - type: web
    name: resume-skill-gap
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: APP_ENV
        value: production
      - key: MAX_FILE_SIZE_MB
        value: "5"
      - key: MAX_JOB_DESCRIPTION_LENGTH
        value: "4000"
      - key: ALLOWED_ORIGINS
        sync: false
